<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marking Attendance...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px;
            background: #f0f2f5;
        }
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>⏳ Marking Attendance...</h1>
    <div class="loader"></div>
    <p>Please wait while your attendance is being recorded.</p>

    <script>
        // Redirect directly to mark_attendance
        setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const course = urlParams.get('course') || 'CSC101';
            const expires = urlParams.get('expires') || '9999999999';
            
            window.location.href = `/mark_attendance?course=${course}&expires=${expires}`;
        }, 1500);
    </script>
</body>
</html>
